services:
  - type: web
    name: shield-safety-app
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SMS_PROVIDER
        value: demo
      - key: DB_TYPE
        value: json_file
      - key: PORT
        value: 10000
